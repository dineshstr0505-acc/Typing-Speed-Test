<!DOCTYPE html>
<html>
    <head>
      <link rel="stylesheet" href="index.css">
    </head>
    <body>
        <div class="container">
            <h1>Typing Speed Test</h1>
            <div class="text-box">
                <p id="paragraph">
                     The quick brown fox jumps over the lazy dog. Practice typing every day to improve your typing speed and accuracy.
                </p>
            </div>
            <textarea id="input" placeholder="start typing here..." autofocus></textarea>
            <div class="details">
                <div class="box">
                    <span>Time</span>
                    <h2 id="time">60</h2>
                </div>
                <div class="box">
                    <span>WPM</span>
                    <h2 id="wpm">0</h2>
                </div>
                <div class="box">
                    <span>Mistakes</span>
                    <h2 id="mistakes">0</h2>
                </div>
                <div class="box">
                    <span>Accuracy</span>
                    <h2 id="accuracy">100%</h2>
                </div>
            </div>
            <button id="restart">Restart Test</button>
        </div>
        <script src="index.js"></script>
    </body>
</html>
